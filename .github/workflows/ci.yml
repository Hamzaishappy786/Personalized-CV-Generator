name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  repo-guard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fail on large tracked files
        shell: bash
        run: |
          max_size=$((50 * 1024 * 1024))
          while IFS= read -r file; do
            [ -f "$file" ] || continue
            size=$(wc -c < "$file")
            if [ "$size" -gt "$max_size" ]; then
              echo "Tracked file too large: $file ($size bytes)"
              exit 1
            fi
          done < <(git ls-files)

  python-syntax:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Compile Python files
        shell: bash
        run: |
          python -m compileall files

